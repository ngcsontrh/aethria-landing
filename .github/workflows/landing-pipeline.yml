name: Landing Pipeline

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

concurrency:
  group: landing-pipeline
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy landing
    runs-on: ubuntu-latest

    env:
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      PUBLIC_CHAT_URL: ${{ vars.PUBLIC_CHAT_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create production environment file
        shell: bash
        run: |
          cp .env.example .env
          echo "PUBLIC_SITE_URL=${PUBLIC_SITE_URL}" > .env
          echo "PUBLIC_CHAT_URL=${PUBLIC_CHAT_URL}" >> .env

      - name: Build
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
          output_location: ""
          skip_app_build: true
